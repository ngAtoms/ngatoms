name: Release

on:
  pull_request:
    branches:
      - main
      - lts
      - rc
  push:
    branches:
      - main
      - lts
      - rc

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build --if-present

  release:
    name: Release (${{ github.ref_name }})
    needs: ci
    if: github.event_name == 'push' && contains(fromJSON('["main","lts","rc"]'), github.ref_name)
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Enter LTS pre-release mode
        if: github.ref_name == 'lts'
        run: npm run pre:enter:lts

      - name: Version packages
        run: npm run version:packages

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "chore: version packages" || echo "nothing to commit"

      - name: Build packages
        run: npm run build --if-present

      - name: Publish
        run: npm run publish:changesets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push
        run: git push --follow-tags

      - name: Exit LTS pre-release mode
        if: always() && github.ref_name == 'lts'
        run: |
          npm run pre:exit
          git add -A
          git commit -m "chore: exit prerelease mode" || echo "nothing to commit"
          git push
